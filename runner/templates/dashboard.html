    function wireProjectRoleControls() {
      const root = document.getElementById("project-content");
      if (!root) {
        return;
      }
      root.querySelectorAll("[data-role-toggle][data-role-id]").forEach(button => {
        button.addEventListener("click", () => {
          if (settingsEditingLocked()) {
            return;
          }
          const roleId = String(button.getAttribute("data-role-id") || "").trim();
          if (!roleId || !getProjectRoleIds().includes(roleId)) {
            return;
          }
          CURRENT_ROLE_SELECTION[roleId] = !Boolean(CURRENT_ROLE_SELECTION[roleId]);
          refreshProjectRoleToggleStates();
          validateProjectSettingsUI();
        });
      });
      root.querySelectorAll("[data-group-action][data-role-ids]").forEach(button => {
        button.addEventListener("click", () => {
          if (settingsEditingLocked()) {
            return;
          }
          const action = String(button.getAttribute("data-group-action") || "").trim().toLowerCase();
          const nextEnabled = action === "enable";
          const roleIds = parseRoleIdList(button.getAttribute("data-role-ids"));
          if (!roleIds.length) {
            return;
          }
          roleIds.forEach(roleId => {
            CURRENT_ROLE_SELECTION[roleId] = nextEnabled;
          });
          refreshProjectRoleToggleStates();
          validateProjectSettingsUI();
        });
      });
      refreshProjectRoleToggleStates();
      syncProjectEditingState();
    }

    function syncProjectEditingState() {
      const root = document.getElementById("project-content");
      if (!root) {
        return;
      }
      const locked = settingsEditingLocked();
      root.querySelectorAll(".project-settings input, .project-settings select, .project-settings textarea").forEach(element => {
        element.disabled = locked;
      });
      root.querySelectorAll("[data-role-toggle], [data-group-action]").forEach(element => {
        element.disabled = locked;
      });
    }

    function validateProjectSettingsValues() {
      const errors = [];
      const primaryAdapter = settingValue("setting-host-primary-adapter");
      if (!SETTINGS_OPTIONS.hostPrimaryAdapter.includes(primaryAdapter)) {
        errors.push("Primary Adapter must be one of the supported adapter IDs.");
      }

      const adapterCommand = settingValue("setting-host-adapter-command");
      if (!adapterCommand) {
        errors.push("Adapter Command must be a non-empty string.");
      }

      const sessionMode = settingValue("setting-host-session-mode");
      if (!SETTINGS_OPTIONS.hostSessionMode.includes(sessionMode)) {
        errors.push("Session Mode must be per-role-threads or stateless.");
      }

      const turnsRaw = settingValue("setting-guard-max-turns");
      const turns = Number(turnsRaw);
      if (!Number.isInteger(turns) || turns <= 0) {
        errors.push("Max Turns Per Role Session must be an integer greater than 0.");
      }

      const ageRaw = settingValue("setting-guard-max-age");
      const age = Number(ageRaw);
      if (!Number.isInteger(age) || age <= 0) {
        errors.push("Max Session Age must be an integer greater than 0.");
      }

      const forceReload = settingValue("setting-guard-force-reload");
      if (!SETTINGS_OPTIONS.boolValues.includes(forceReload)) {
        errors.push("Force Reload On Context Change must be true or false.");
      }

      const executionMode = settingValue("setting-execution-mode");
      if (!SETTINGS_OPTIONS.executionMode.includes(executionMode)) {
        errors.push("Execution Mode must be sequential.");
      }

      const handoffAuthority = settingValue("setting-execution-handoff-authority");
      if (!SETTINGS_OPTIONS.executionHandoffAuthority.includes(handoffAuthority)) {
        errors.push("Handoff Authority must be operator-mediated.");
      }

      const selectionPolicy = settingValue("setting-execution-selection-policy");
      if (!SETTINGS_OPTIONS.executionSelectionPolicy.includes(selectionPolicy)) {
        errors.push("Selection Policy must be dependency-fifo.");
      }

      const unexpectedPolicy = settingValue("setting-execution-unexpected-event-policy");
      if (!SETTINGS_OPTIONS.executionUnexpectedEventPolicy.includes(unexpectedPolicy)) {
        errors.push("Unexpected Event Policy must be errors-only, errors-or-warnings, or proceed.");
      }

      const dashboardOutput = settingValue("setting-dashboard-output-file");
      if (!dashboardOutput) {
        errors.push("Dashboard Output File must be a non-empty path.");
      }

      const refreshPolicy = settingValue("setting-dashboard-refresh-policy");
      if (!SETTINGS_OPTIONS.dashboardRefreshPolicy.includes(refreshPolicy)) {
        errors.push("Dashboard Refresh Policy must be after-every-step.");
      }

      const failureMode = settingValue("setting-dashboard-failure-mode");
      if (!SETTINGS_OPTIONS.dashboardFailureMode.includes(failureMode)) {
        errors.push("Dashboard Failure Mode must be non-blocking-log.");
      }
      return errors;
    }

    function validateProjectSettingsUI() {
      const errors = validateProjectSettingsValues();
      const validation = document.getElementById("project-settings-validation");
      if (validation) {
        if (!errors.length) {
          validation.className = "settings-validation ok";
          validation.innerHTML = "Settings values satisfy current dashboard constraints.";
        } else {
          validation.className = "settings-validation error";
          validation.innerHTML = "<strong>Validation issues:</strong><ul class=\"settings-errors\">" +
            errors.map(error => "<li>" + esc(error) + "</li>").join("") +
            "</ul>";
        }
      }

      const currentSnapshot = buildSettingsSnapshotFromUI();
      const changes = settingsChangesFromSnapshots(INITIAL_SETTINGS_SNAPSHOT, currentSnapshot);
      const roleChanges = roleSelectionChanges(INITIAL_ROLE_SELECTION, CURRENT_ROLE_SELECTION);
      renderSettingsApplyActions(changes, roleChanges, errors);
      syncProjectEditingState();
    }

    function docTimestampText(value) {
      const raw = String(value || "").trim();
      if (!raw) {
        return "n/a";
      }
      return formatLocalTimestamp(raw);
    }

    function compareDocuments(left, right) {
      const leftTitle = String(left.title || left.path || "");
      const rightTitle = String(right.title || right.path || "");
      let cmp = 0;

      if (docSortKey === "created" || docSortKey === "modified") {
        const field = docSortKey === "created" ? "created_at_utc" : "modified_at_utc";
        const leftRaw = String(left[field] || "").trim();
        const rightRaw = String(right[field] || "").trim();
        if (!leftRaw && rightRaw) {
          cmp = 1;
        } else if (leftRaw && !rightRaw) {
          cmp = -1;
        } else {
          cmp = leftRaw.localeCompare(rightRaw, undefined, { sensitivity: "base", numeric: true });
        }
      } else {
        cmp = leftTitle.localeCompare(rightTitle, undefined, { sensitivity: "base", numeric: true });
      }

      if (cmp === 0) {
        cmp = String(left.path || "").localeCompare(String(right.path || ""), undefined, {
          sensitivity: "base",
          numeric: true
        });
      }
      return docSortDir === "desc" ? -cmp : cmp;
    }

    function renderDocuments() {
      const docs = DATA.documents || [];
      const list = document.getElementById("documents-list");
      const view = document.getElementById("documents-view");
      list.innerHTML = "";
      if (!docs.length) {
        list.innerHTML = '<div class="panel-pad empty">No documents found.</div>';
        view.innerHTML = '<p class="empty">No included markdown documents matched dashboard filters.</p>';
        return;
      }

      const sortedDocs = docs.slice().sort(compareDocuments);
      if (!activeDocId || !sortedDocs.some(doc => doc.id === activeDocId)) {
        activeDocId = sortedDocs[0].id;
      }

      const controls = document.createElement("div");
      controls.className = "doc-list-controls";
      controls.innerHTML = [
        '<label for="doc-sort-key">Sort By</label>',
        '<select id="doc-sort-key">',
        '<option value="name"' + (docSortKey === "name" ? " selected" : "") + ">Document Name</option>",
        '<option value="created"' + (docSortKey === "created" ? " selected" : "") + ">Creation Date</option>",
        '<option value="modified"' + (docSortKey === "modified" ? " selected" : "") + ">Last Modified Date</option>",
        "</select>",
        '<select id="doc-sort-dir">',
        '<option value="asc"' + (docSortDir === "asc" ? " selected" : "") + ">Ascending</option>",
        '<option value="desc"' + (docSortDir === "desc" ? " selected" : "") + ">Descending</option>",
        "</select>"
      ].join("");
      list.appendChild(controls);
      const keySelect = controls.querySelector("#doc-sort-key");
      const dirSelect = controls.querySelector("#doc-sort-dir");
      if (keySelect) {
        keySelect.addEventListener("change", () => {
          docSortKey = keySelect.value;
          renderDocuments();
        });
      }
      if (dirSelect) {
        dirSelect.addEventListener("change", () => {
          docSortDir = dirSelect.value;
          renderDocuments();
        });
      }

      sortedDocs.forEach(doc => {
        const button = document.createElement("button");
        const primaryPrefix = doc.is_primary ? "Primary: " : "";
        button.className = "left-item" + (doc.id === activeDocId ? " active" : "");
        button.innerHTML = [
          '<span class="doc-item-title">' + esc(primaryPrefix + doc.title) + "</span>",
          '<span class="doc-item-meta">Created: ' + esc(docTimestampText(doc.created_at_utc)) + "</span>",
          '<span class="doc-item-meta">Last Modified: ' + esc(docTimestampText(doc.modified_at_utc)) + "</span>"
        ].join("");
        button.onclick = () => {
          activeDocId = doc.id;
          renderDocuments();
        };
        list.appendChild(button);
      });

      const active = sortedDocs.find(doc => doc.id === activeDocId) || sortedDocs[0];
      const createdText = docTimestampText(active.created_at_utc);
      const modifiedText = docTimestampText(active.modified_at_utc);
      view.innerHTML =
        "<h2>" + esc(active.title) + "</h2>" +
        '<p class="doc-path">' +
          fileLinkHtml(active.path, active.path) +
          "<br>Created: <strong>" + esc(createdText) + "</strong> | Last Modified: <strong>" + esc(modifiedText) + "</strong>" +
        "</p>" +
        active.html;
    }

    function renderTasks() {
      const search = document.getElementById("task-search").value.toLowerCase();
      const filter = document.getElementById("task-status-filter").value;
      const allTasks = DATA.tasks || [];
      const filtered = allTasks.filter(task => {
        const hay = TASK_COLUMNS.map(column => taskColumnText(task, column)).join(" ").toLowerCase();
        const matchesSearch = !search || hay.includes(search);
        const matchesStatus = !filter || filter === "ALL" || task.status === filter;
        return matchesSearch && matchesStatus;
      });

      filtered.sort((left, right) => {
        const leftRaw = taskColumnText(left, sortKey);
        const rightRaw = taskColumnText(right, sortKey);
        const cmp = leftRaw.localeCompare(rightRaw, undefined, { sensitivity: "base", numeric: true });
        return sortDir === "asc" ? cmp : -cmp;
      });

      const head = document.getElementById("tasks-head");
      head.innerHTML = "<tr>" + TASK_COLUMNS.map(column => {
        const marker = sortKey === column ? (sortDir === "asc" ? " ▲" : " ▼") : "";
        return '<th data-col="' + column + '">' + esc(TASK_LABELS[column]) + marker + "</th>";
      }).join("") + "</tr>";
      head.querySelectorAll("th").forEach(th => {
        th.onclick = () => {
          const nextKey = th.dataset.col;
          if (sortKey === nextKey) {
            sortDir = sortDir === "asc" ? "desc" : "asc";
          } else {
            sortKey = nextKey;
            sortDir = "asc";
          }
          renderTasks();
        };
      });

      const body = document.getElementById("tasks-body");
      if (!filtered.length) {
        body.innerHTML = '<tr><td colspan="' + TASK_COLUMNS.length + '" class="empty">No tasks match current filters.</td></tr>';
        return;
      }
      body.innerHTML = filtered.map(task => {
        return "<tr>" + TASK_COLUMNS.map(column => {
          if (column === "deliverables") {
            return "<td>" + renderDeliverablesCell(task) + "</td>";
          }
          const rendered = taskColumnText(task, column);
          return "<td>" + esc(rendered) + "</td>";
        }).join("") + "</tr>";
      }).join("");
    }

    function eventHtml(entry) {
      const role = entry.role_id || "unknown";
      const roleAccent = roleColor(role);
      const severity = eventSeverity(entry);
      const accent = severity === "error" ? "#ef4444" : (severity === "warning" ? "#f59e0b" : roleAccent);
      const status = entry.status ? " | " + entry.status : "";
      const task = entry.task_id ? " | Task " + entry.task_id : "";
      const summary = entry.summary || entry.event_type || "Activity event";
      const metaText = (entry.event_type || "event") + task + status;
      const runJournal = resolveKnownPath(entry.run_journal_path || "");
      const runJournalHtml = runJournal
        ? ' | Journal ' + fileLinkHtml(runJournal, runJournal)
        : "";
      const badge = severity === "error"
        ? '<span class="event-badge error">Error</span>'
        : (severity === "warning" ? '<span class="event-badge warning">Warning</span>' : "");
      return [
        '<article class="event ' + severity + '" style="border-left-color:' + accent + '">',
        '<div class="event-head">',
        '<span class="event-role" style="background:' + roleAccent + '">' + esc(role) + "</span>",
        '<span class="event-time">' + esc(formatLocalTimestamp(entry.ts_utc || "")) + "</span>",
        "</div>",
        badge,
        '<p class="event-summary">' + linkifyProjectFiles(summary) + "</p>",
        '<div class="event-meta">' + linkifyProjectFiles(metaText) + runJournalHtml + "</div>",
        "</article>"
      ].join("");
    }

    function renderAgents() {
      const tabs = document.getElementById("agent-tabs");
      const enabledSet = new Set(DATA.project.enabled_roles || []);
      const disabledSet = new Set(DATA.project.disabled_roles || []);
      const agents = (DATA.agents || []).slice();
      const roleEntries = agents.map(agent => {
        const roleId = String(agent.role_id || "");
        const isEnabled = typeof agent.enabled === "boolean"
          ? agent.enabled
          : (enabledSet.has(roleId) && !disabledSet.has(roleId));
        return {
          role_id: roleId,
          display_name: String(agent.display_name || roleDisplayName(DATA.project, roleId)),
          color: String(agent.color || roleColor(roleId)),
          enabled: isEnabled,
          discipline: roleDiscipline(roleId)
        };
      });
      roleEntries.sort(compareRoleEntries);
      const { operatorEntry, grouped, categories } = groupedRoleEntries(roleEntries);
      const openGroups = readOpenAgentGroups();
      tabs.innerHTML = "";
      if (!roleEntries.length) {
        document.getElementById("agent-panel").innerHTML = '<p class="empty">No agents found.</p>';
        return;
      }
      const orderedRoleIds = [];
      if (operatorEntry) {
        orderedRoleIds.push(operatorEntry.role_id);
      }
      categories.forEach(category => {
        (grouped[category] || []).forEach(entry => orderedRoleIds.push(entry.role_id));
      });
      if (!activeAgentId || !orderedRoleIds.includes(activeAgentId)) {
        activeAgentId = orderedRoleIds[0];
      }

      if (operatorEntry) {
        tabs.appendChild(buildAgentTabButton(operatorEntry));
      }
      categories.forEach(category => {
        const entries = grouped[category] || [];
        if (!entries.length) {
          return;
        }
        const section = document.createElement("details");
        section.className = "agent-tab-group";
        section.open = openGroups.has(category);
        const heading = document.createElement("summary");
        heading.className = "agent-tab-group-title";
        heading.textContent = category + " (" + entries.length + ")";
        section.appendChild(heading);
        const body = document.createElement("div");
        body.className = "agent-tab-group-body";
        entries.forEach(entry => {
          body.appendChild(buildAgentTabButton(entry));
        });
        section.appendChild(body);
        section.addEventListener("toggle", () => {
          if (section.open) {
            openGroups.add(category);
          } else {
            openGroups.delete(category);
          }
          writeOpenAgentGroups(openGroups);
        });
        tabs.appendChild(section);
      });
      const active = agents.find(agent => agent.role_id === activeAgentId) || agents[0];
      renderAgentPanel(active);
    }

    let taskControlsWired = false;
    let liveEventSource = null;
    let liveReconnectTimer = null;
    let refreshQueued = false;

    async function fetchJson(path, options) {
      const response = await fetch(path, options || {});
      let payload = null;
      try {
        payload = await response.json();
      } catch (error) {
        payload = null;
      }
      if (!response.ok || !payload || payload.ok === false) {
        const message = payload && Array.isArray(payload.errors) && payload.errors.length
          ? payload.errors.join("; ")
          : ("Request failed: " + response.status + " " + response.statusText);
        throw new Error(message);
      }
      return payload;
    }

    function resetSettingsBaselines() {
      INITIAL_SETTINGS_SNAPSHOT = buildSettingsSnapshotFromData(DATA.settings || {});
      INITIAL_ROLE_SELECTION = buildRoleSelectionFromProject(DATA.project || {});
      CURRENT_ROLE_SELECTION = Object.assign({}, INITIAL_ROLE_SELECTION);
    }

    function applyDashboardPayload(nextPayload) {
      DATA = nextPayload || {};
      refreshKnownFileIndex();
      resetSettingsBaselines();
    }

    function updateTaskStatusFilterOptions() {
      const filter = document.getElementById("task-status-filter");
      if (!filter) {
        return;
      }
      const current = String(filter.value || "ALL");
      const statuses = ["ALL", ...Object.keys(DATA.project.status_counts || {})];
      filter.innerHTML = statuses.map(status => (
        '<option value="' + esc(status) + '">' + (status === "ALL" ? "All Statuses" : esc(status)) + "</option>"
      )).join("");
      if (statuses.includes(current)) {
        filter.value = current;
      } else {
        filter.value = "ALL";
      }
    }

    function initTaskControls() {
      updateTaskStatusFilterOptions();
      if (taskControlsWired) {
        return;
      }
      document.getElementById("task-search").addEventListener("input", renderTasks);
      document.getElementById("task-status-filter").addEventListener("change", renderTasks);
      taskControlsWired = true;
    }

    function renderAllPanels() {
      renderHeader();
      renderInitialization();
      renderProject();
      renderDocuments();
      initTaskControls();
      renderTasks();
      renderActivity();
      renderAgents();
    }

    async function refreshDashboardData() {
      if (!HAS_API) {
        return;
      }
      const response = await fetchJson("/api/dashboard");
      applyDashboardPayload(response.dashboard || {});
      renderAllPanels();
    }

    function queueDashboardRefresh() {
      if (refreshQueued) {
        return;
      }
      refreshQueued = true;
      window.setTimeout(() => {
        refreshQueued = false;
        void refreshDashboardData().catch(error => {
          console.error("Dashboard refresh failed:", error);
        });
      }, 120);
    }

    function scheduleLiveReconnect() {
      if (liveReconnectTimer) {
        return;
      }
      liveReconnectTimer = window.setTimeout(() => {
        liveReconnectTimer = null;
        connectLiveUpdates();
      }, 1000);
    }

    function connectLiveUpdates() {
      if (!HAS_API || typeof EventSource === "undefined") {
        return;
      }
      if (liveEventSource) {
        try {
          liveEventSource.close();
        } catch (error) {
          // Ignore close errors.
        }
      }
      const source = new EventSource("/api/events");
      liveEventSource = source;
      const handledEvents = [
        "connected",
        "tasks_changed",
        "activity_changed",
        "state_changed",
        "settings_changed",
        "message"
      ];
      handledEvents.forEach(eventName => {
        source.addEventListener(eventName, () => {
          if (eventName === "connected") {
            return;
          }
          queueDashboardRefresh();
        });
      });
      source.onerror = () => {
        try {
          source.close();
        } catch (error) {
          // Ignore close errors.
        }
        scheduleLiveReconnect();
      };
    }

    async function boot() {
      const persistedTab = safeStorageGet(STORAGE_KEYS.activeTab);
      if (persistedTab && TAB_DEFS.some(tab => tab.id === persistedTab)) {
        activeTab = persistedTab;
      }
      if (HAS_API) {
        try {
          await refreshDashboardData();
          if (!persistedTab && !initState().is_ready) {
            activeTab = "init";
          }
        } catch (error) {
          console.error("Initial dashboard load failed:", error);
          if (!persistedTab && !initState().is_ready) {
            activeTab = "init";
          }
          renderAllPanels();
        }
        renderTabs();
        connectLiveUpdates();
      } else {
        applyDashboardPayload(DATA);
        if (!persistedTab && !initState().is_ready) {
          activeTab = "init";
        }
        renderTabs();
        renderAllPanels();
      }
    }

    void boot();
  </script>
</body>
</html>
