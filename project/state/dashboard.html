    function openDocumentsTabForPath(path) {
      const target = String(path || "").trim().toLowerCase();
      const docs = Array.isArray(DATA.documents) ? DATA.documents : [];
      const match = docs.find(doc => String(doc.path || "").trim().toLowerCase() === target);
      if (match) {
        activeDocId = match.id;
      }
      activeTab = "documents";
      renderTabs();
      renderDocuments();
    }

    function normalizedTaskStatus(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replaceAll("_", " ")
        .replaceAll("-", " ");
    }

    function latestActivityEntry() {
      const events = Array.isArray(DATA.activity_log) ? DATA.activity_log : [];
      return events.length ? events[0] : null;
    }

    function settingsEditingLocked() {
      return computeHeaderStatusModel().className === "status-orchestration-running";
    }

    function editLockBannerHtml() {
      if (!settingsEditingLocked()) {
        return "";
      }
      return '<div class="edit-lock-banner" role="alert">Settings cannot be changed while orchestration is running. Check your IDE Operator thread for details, then pause or wait for completion before editing.</div>';
    }

    function computeHeaderStatusModel() {
      const init = initState();
      const state = (DATA.project && DATA.project.state) ? DATA.project.state : {};
      const hasRunId = Boolean(String(state.run_id || "").trim());
      const activeRole = String(state.active_role || "").trim();
      const currentRequest = String(state.current_request || "").trim();
      const lastCompletedTaskId = String(state.last_completed_task_id || "").trim();
      const tasks = Array.isArray(DATA.tasks) ? DATA.tasks : [];
      const doneCount = tasks.filter(task => normalizedTaskStatus(task && task.status) === "done").length;
      const inProgressCount = tasks.filter(task => normalizedTaskStatus(task && task.status) === "in progress").length;
      const remainingCount = Math.max(0, tasks.length - doneCount);
      const latestEvent = latestActivityEntry();
      const latestEventStatus = normalizedTaskStatus(latestEvent && latestEvent.status);
      const latestEventType = String((latestEvent && latestEvent.event_type) || "").trim().toLowerCase();
      const hasOperatorActivity = (Array.isArray(DATA.activity_log) ? DATA.activity_log : []).some(entry => {
        const eventType = String((entry && entry.event_type) || "").toLowerCase();
        return eventType.includes("operator") || eventType.includes("agent_result");
      });
      const waitingForInput = latestEventStatus === "needs input" ||
        latestEventType === "operator_human_feedback" ||
        latestEventType === "human_feedback_written";
      const hasRunContext = hasRunId || Boolean(activeRole) || Boolean(currentRequest) ||
        Boolean(lastCompletedTaskId) || hasOperatorActivity;

      if (!init.is_ready) {
        return {
          label: "Setup Required",
          className: "status-setup-required",
          action: {
            label: "Open Project Tab",
            tabId: "init"
          }
        };
      }

      if (state.halted) {
        return {
          label: "Paused - Action Required (Check IDE)",
          className: "status-paused-action-required"
        };
      }

      if (!hasRunContext) {
        return {
          label: "Operator Not Initialized",
          className: "status-operator-not-initialized",
          action: {
            label: "Open README",
            tabId: "documents",
            docPath: "README.md"
          }
        };
      }

      if (waitingForInput) {
        return {
          label: "Waiting for Your Input",
          className: "status-waiting-input"
        };
      }

      if (inProgressCount > 0 || Boolean(activeRole)) {
        return {
          label: "Orchestration Running",
          className: "status-orchestration-running"
        };
      }

      if (tasks.length > 0 && remainingCount === 0) {
        return {
          label: "Completed",
          className: "status-completed"
        };
      }

      return {
        label: "Ready to Start",
        className: "status-ready-to-start"
      };
    }

    function renderHeader() {
      const meta = document.getElementById("header-meta");
      const status = computeHeaderStatusModel();
      let actionHtml = "";
      if (status.action) {
        actionHtml = ' <a href="#" class="status-action-link" id="header-status-action">' +
          esc(status.action.label) +
          "</a>";
      }

      meta.innerHTML =
        '<span class="status-indicator ' + status.className + '">' +
        '<span class="status-dot" aria-hidden="true"></span>' +
        '<span>' + esc(status.label) + actionHtml + "</span>" +
        "</span>";

      const actionLink = document.getElementById("header-status-action");
      if (actionLink && status.action) {
        actionLink.addEventListener("click", event => {
          event.preventDefault();
          if (status.action.docPath) {
            openDocumentsTabForPath(status.action.docPath);
            return;
          }
          activeTab = status.action.tabId;
          renderTabs();
        });
      }
    }

    function kvRow(label, value) {
      return "<dt>" + esc(label) + "</dt><dd>" + esc(value) + "</dd>";
    }

    function initFieldValue(id) {
      const element = document.getElementById(id);
      if (!element) {
        return "";
      }
      return String(element.value || "").trim();
    }

    function initValidationErrors(values) {
      const errors = [];
      const requiredFields = [
        { id: "init-project-id", key: "project_id", label: "project.id" },
        { id: "init-project-name", key: "project_name", label: "project.name" },
        { id: "init-project-goals", key: "project_goals", label: "Project goals" },
        { id: "init-target-users", key: "target_users", label: "Target users" },
        { id: "init-key-constraints", key: "key_constraints", label: "Key constraints" },
        { id: "init-primary-deliverables", key: "primary_deliverables", label: "Primary deliverables" },
        { id: "init-acceptance-criteria", key: "acceptance_criteria", label: "Acceptance criteria" }
      ];
      requiredFields.forEach(field => {
        const value = values
          ? String(values[field.key] || "").trim()
          : initFieldValue(field.id);
        if (!value) {
          errors.push(field.label + " is required.");
        }
      });
      return errors;
    }

    function initPayloadFromUI() {
      return {
        project: {
          id: initFieldValue("init-project-id"),
          name: initFieldValue("init-project-name")
        },
        context: {
          project_goals: initFieldValue("init-project-goals"),
          target_users: initFieldValue("init-target-users"),
          key_constraints: initFieldValue("init-key-constraints"),
          primary_deliverables: initFieldValue("init-primary-deliverables"),
          acceptance_criteria: initFieldValue("init-acceptance-criteria"),
          non_goals: initFieldValue("init-non-goals"),
          notes: initFieldValue("init-notes")
        }
      };
    }

    async function submitInitializationDetails() {
      if (initSubmitInFlight) {
        return;
      }
      if (!HAS_API) {
        initStatusText = "Start the local server (npm run dev) to submit initialization.";
        renderInitialization();
        return;
      }
      if (settingsEditingLocked()) {
        initStatusText = "Project details are locked while orchestration is running. Check IDE Operator thread.";
        renderInitialization();
        return;
      }
      const payload = initPayloadFromUI();
      const errors = initValidationErrors({
        project_id: payload.project.id,
        project_name: payload.project.name,
        project_goals: payload.context.project_goals,
        target_users: payload.context.target_users,
        key_constraints: payload.context.key_constraints,
        primary_deliverables: payload.context.primary_deliverables,
        acceptance_criteria: payload.context.acceptance_criteria
      });
      if (errors.length) {
        initStatusText = "Fix required fields before submitting initialization.";
        renderInitialization();
        return;
      }

      initSubmitInFlight = true;
      initStatusText = "Submitting project details...";
      renderInitialization();
      try {
        await fetchJson("/api/init/submit", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });
        initStatusText = "Project details saved. Open README in Documents tab for Operator initialization steps.";
        await refreshDashboardData();
        activeTab = "project";
        renderTabs();
      } catch (error) {
        initStatusText = "Initialization submit failed: " + String(error.message || error);
      } finally {
        initSubmitInFlight = false;
        renderInitialization();
      }
    }

    function renderInitialization() {
      const root = document.getElementById("init-content");
      if (!root) {
        return;
      }
      const init = initState();
      const fields = init.fields;
      const errors = initValidationErrors(fields);
      const missing = init.missing_fields || [];
      const serverHint = HAS_API ? "" : "Direct submit requires the local server URL (http://127.0.0.1:4173).";
      const editingLocked = settingsEditingLocked();
      const submitDisabled = initSubmitInFlight || !HAS_API || editingLocked;

      root.innerHTML = [
        '<section class="init-panel">',
        editLockBannerHtml(),
        "<h3>Project Initialization</h3>",
        '<ol class="settings-hint">' +
          "<li>Fill out all required fields on this page and click <strong>Submit Project Details</strong>.</li>" +
          "<li>Optional: review additional settings and agent enable/disable in the <a href=\"#\" id=\"init-settings-link\">Settings tab</a>.</li>" +
          "<li>Open the <a href=\"#\" id=\"init-readme-link\">README document on the Documents tab</a> and follow the Operator initialization instructions.</li>" +
        "</ol>",
        serverHint ? '<p class="settings-hint">' + esc(serverHint) + "</p>" : "",
        (init.is_ready && !missing.length)
          ? '<div class="settings-validation ok">Required project details are complete.</div>'
          : (
            '<div class="settings-validation error"><strong>Missing required fields:</strong><ul class="init-errors">' +
            (missing.length
              ? missing.map(item => "<li>" + esc(item) + "</li>").join("")
              : "<li>Complete required initialization details.</li>") +
            "</ul></div>"
          ),
        '<div class="init-grid">',
        '<div class="init-field"><label for="init-project-id">Project ID (Required)</label><input id="init-project-id" value="' + esc(fields.project_id) + '" placeholder="acme-subscription-optimizer"></div>',
        '<div class="init-field"><label for="init-project-name">Project Name (Required)</label><input id="init-project-name" value="' + esc(fields.project_name) + '" placeholder="Acme Subscription Optimizer"></div>',
        '<div class="init-field"><label for="init-project-goals">Project Goals (Required)</label><textarea id="init-project-goals" placeholder="Business outcomes and targets.">' + esc(fields.project_goals) + "</textarea></div>",
        '<div class="init-field"><label for="init-target-users">Target Users (Required)</label><textarea id="init-target-users" placeholder="Who this project serves.">' + esc(fields.target_users) + "</textarea></div>",
        '<div class="init-field"><label for="init-key-constraints">Key Constraints (Required)</label><textarea id="init-key-constraints" placeholder="Time, budget, stack, compliance.">' + esc(fields.key_constraints) + "</textarea></div>",
        '<div class="init-field"><label for="init-primary-deliverables">Primary Deliverables (Required)</label><textarea id="init-primary-deliverables" placeholder="Expected specs/code/tests/assets.">' + esc(fields.primary_deliverables) + "</textarea></div>",
        '<div class="init-field"><label for="init-acceptance-criteria">Acceptance Criteria (Required)</label><textarea id="init-acceptance-criteria" placeholder="How completion is validated.">' + esc(fields.acceptance_criteria) + "</textarea></div>",
        '<div class="init-field"><label for="init-non-goals">Non-goals (Optional)</label><textarea id="init-non-goals" placeholder="What is intentionally out of scope.">' + esc(fields.non_goals) + "</textarea></div>",
        '<div class="init-field"><label for="init-notes">Notes (Optional)</label><textarea id="init-notes" placeholder="Extra context for Operator and specialist roles.">' + esc(fields.notes) + "</textarea></div>",
        "</div>",
        (errors.length)
          ? ('<ul class="init-errors">' + errors.map(item => "<li>" + esc(item) + "</li>").join("") + "</ul>")
          : "",
        '<div class="init-actions">',
        '<button type="button" class="init-submit-btn" id="init-submit-btn">Submit Project Details</button>',
        '<button type="button" id="init-open-project-btn">Open Settings & Agents</button>',
        '<span class="settings-copy-status" id="init-submit-status"></span>',
        "</div>",
        "</section>"
      ].join("");

      const submitButton = document.getElementById("init-submit-btn");
      const settingsLink = document.getElementById("init-settings-link");
      const docsLink = document.getElementById("init-readme-link");
      const openProjectButton = document.getElementById("init-open-project-btn");
      const submitStatus = document.getElementById("init-submit-status");

      if (submitButton) {
        submitButton.disabled = submitDisabled;
        submitButton.textContent = initSubmitInFlight ? "Submitting..." : "Submit Project Details";
        submitButton.addEventListener("click", () => {
          void submitInitializationDetails();
        });
      }
      if (openProjectButton) {
        openProjectButton.addEventListener("click", () => {
          activeTab = "project";
          renderTabs();
        });
      }
      if (settingsLink) {
        settingsLink.addEventListener("click", event => {
          event.preventDefault();
          activeTab = "project";
          renderTabs();
        });
      }
      if (docsLink) {
        docsLink.addEventListener("click", event => {
          event.preventDefault();
          openDocumentsTabForPath("README.md");
        });
      }

      if (editingLocked) {
        root.querySelectorAll("input, textarea, select").forEach(element => {
          element.disabled = true;
        });
      }

      if (submitStatus) {
        if (initSubmitInFlight) {
          submitStatus.textContent = "Submitting...";
        } else if (initStatusText) {
          submitStatus.textContent = initStatusText;
        } else if (editingLocked) {
          submitStatus.textContent = "Edits are locked while orchestration is running. Check IDE Operator thread.";
        } else if (submitDisabled && errors.length) {
          submitStatus.textContent = "Complete required fields to submit.";
        } else if (!HAS_API) {
          submitStatus.textContent = "Start local server to submit initialization.";
        } else {
          submitStatus.textContent = "Ready to submit.";
        }
      }
    }

    function roleDisplayName(project, roleId) {
      const map = (project && typeof project.role_display_names === "object")
        ? project.role_display_names
        : {};
      const mapped = map[roleId];
      if (mapped) {
        return String(mapped);
      }
      return String(roleId || "")
        .replaceAll("-", " ")
        .replaceAll("_", " ")
        .replace(/\b\w/g, ch => ch.toUpperCase());
    }

    function roleDiscipline(roleId) {
      const id = String(roleId || "").toLowerCase();
      if (id === "operator") {
        return "Operator";
      }
      if (
        id.startsWith("designer-") ||
        id.startsWith("ux-") ||
        id.startsWith("design-") ||
        id === "interaction-designer" ||
        id === "information-architect"
      ) {
        return "Design & UX";
      }
      if (
        id === "art-director" ||
        id === "visual-designer" ||
        id.endsWith("-artist") ||
        id.startsWith("audio-") ||
        id === "sound-designer" ||
        id === "composer" ||
        id === "voice-over-director"
      ) {
        return "Art & Audio";
      }
      if (
        id === "product-manager" ||
        id.endsWith("-spec-writer") ||
        id === "nonfunctional-requirements-writer"
      ) {
        return "Product & Specifications";
      }
      if (
        id.includes("architect") &&
        id !== "information-architect"
      ) {
        return "Architecture";
      }
      if (id.startsWith("development-engineer-")) {
        return "Engineering";
      }
      if (id === "qa-manager" || id.startsWith("qa-")) {
        return "Quality Assurance";
      }
      if (id.startsWith("security-")) {
        return "Security";
      }
      if (
        id.startsWith("localization-") ||
        id === "internationalization-engineer" ||
        id === "translation-quality-manager" ||
        id === "culturalization-specialist" ||
        id === "audio-localization-engineer"
      ) {
        return "Localization";
      }
      if (id.startsWith("data-")) {
        return "Data";
      }
      return "Custom Agents";
    }

    function compareRoleEntries(left, right) {
      const nameCompare = left.display_name.localeCompare(right.display_name, undefined, {
        sensitivity: "base",
        numeric: true
      });
      if (nameCompare !== 0) {
        return nameCompare;
      }
      return left.role_id.localeCompare(right.role_id, undefined, {
        sensitivity: "base",
        numeric: true
      });
    }

    function groupedRoleEntries(roleEntries) {
      const grouped = {};
      let operatorEntry = null;

      (roleEntries || []).forEach(entry => {
        if (entry.role_id === "operator") {
          operatorEntry = entry;
          return;
        }
        const discipline = entry.discipline || "Custom Agents";
        if (!grouped[discipline]) {
          grouped[discipline] = [];
        }
        grouped[discipline].push(entry);
      });

      Object.keys(grouped).forEach(category => grouped[category].sort(compareRoleEntries));
      const categories = Object.keys(grouped).sort((left, right) => {
        const leftIsCustom = left === "Custom Agents";
        const rightIsCustom = right === "Custom Agents";
        if (leftIsCustom && !rightIsCustom) {
          return -1;
        }
        if (!leftIsCustom && rightIsCustom) {
          return 1;
        }
        return left.localeCompare(right, undefined, {
          sensitivity: "base",
          numeric: true
        });
      });

      return { operatorEntry, grouped, categories };
    }

        allowed.unshift(current);

      return allowed.map(value => {
        const selected = value === current ? " selected" : "";
        const isUnknown = !allowedSet.has(value);
        const label = isUnknown ? value + " (unsupported)" : value;
        return '<option value="' + esc(value) + '"' + selected + ">" + esc(label) + "</option>";
      }).join("");

    function settingValue(id) {
      const element = document.getElementById(id);
      if (!element) {
        return "";
      }
      return String(element.value ?? "").trim();
    }

    function integerValueOrRaw(id) {
      const raw = settingValue(id);
      const parsed = Number(raw);
      return Number.isInteger(parsed) ? parsed : raw;
    }

    function booleanFromSelect(value) {
      return String(value).trim().toLowerCase() === "true";
    }

    function buildSettingsSnapshotFromData(projectSettings) {
      const host = (projectSettings && projectSettings.host) ? projectSettings.host : {};
      const guard = (host && host.context_rot_guardrails) ? host.context_rot_guardrails : {};
      const execution = (projectSettings && projectSettings.execution) ? projectSettings.execution : {};
      const dashboard = (projectSettings && projectSettings.dashboard) ? projectSettings.dashboard : {};
      const maxTurns = Number(guard.max_turns_per_role_session);
      const maxAge = Number(guard.max_session_age_minutes);
      const forceReloadRaw = guard.force_reload_on_context_change;
      return {
        "host.primary_adapter": String(host.primary_adapter || "").trim(),
        "host.adapter_command": String(host.adapter_command || "").trim(),
        "host.session_mode": String(host.session_mode || "stateless").trim() || "stateless",
        "host.context_rot_guardrails.max_turns_per_role_session": Number.isInteger(maxTurns) ? maxTurns : 8,
        "host.context_rot_guardrails.max_session_age_minutes": Number.isInteger(maxAge) ? maxAge : 240,
        "host.context_rot_guardrails.force_reload_on_context_change": (
          typeof forceReloadRaw === "boolean" ? forceReloadRaw : booleanFromSelect(forceReloadRaw)
        ),
        "execution.mode": String(execution.mode || "sequential").trim() || "sequential",
        "execution.handoff_authority": String(execution.handoff_authority || "operator-mediated").trim()
          || "operator-mediated",
        "execution.selection_policy": String(execution.selection_policy || "dependency-fifo").trim()
          || "dependency-fifo",
        "execution.unexpected_event_policy": String(execution.unexpected_event_policy || "errors-only").trim()
          || "errors-only",
        "dashboard.output_file": String(dashboard.output_file || "project/state/dashboard.html").trim()
          || "project/state/dashboard.html",
        "dashboard.refresh_policy": String(dashboard.refresh_policy || "after-every-step").trim()
          || "after-every-step",
        "dashboard.failure_mode": String(dashboard.failure_mode || "non-blocking-log").trim()
          || "non-blocking-log"
      };
    }

    function buildSettingsSnapshotFromUI() {
      return {
        "host.primary_adapter": settingValue("setting-host-primary-adapter"),
        "host.adapter_command": settingValue("setting-host-adapter-command"),
        "host.session_mode": settingValue("setting-host-session-mode"),
        "host.context_rot_guardrails.max_turns_per_role_session": integerValueOrRaw("setting-guard-max-turns"),
        "host.context_rot_guardrails.max_session_age_minutes": integerValueOrRaw("setting-guard-max-age"),
        "host.context_rot_guardrails.force_reload_on_context_change": booleanFromSelect(
          settingValue("setting-guard-force-reload")
        ),
        "execution.mode": settingValue("setting-execution-mode"),
        "execution.handoff_authority": settingValue("setting-execution-handoff-authority"),
        "execution.selection_policy": settingValue("setting-execution-selection-policy"),
        "execution.unexpected_event_policy": settingValue("setting-execution-unexpected-event-policy"),
        "dashboard.output_file": settingValue("setting-dashboard-output-file"),
        "dashboard.refresh_policy": settingValue("setting-dashboard-refresh-policy"),
        "dashboard.failure_mode": settingValue("setting-dashboard-failure-mode")
      };
    }

    function sortRoleIds(roleIds) {
      return (roleIds || []).slice().sort((left, right) => {
        const leftId = String(left || "");
        const rightId = String(right || "");
        const leftIsOperator = leftId === "operator";
        const rightIsOperator = rightId === "operator";
        if (leftIsOperator && !rightIsOperator) {
          return -1;
        }
        if (!leftIsOperator && rightIsOperator) {
          return 1;
        }
        return leftId.localeCompare(rightId, undefined, {
          sensitivity: "base",
          numeric: true
        });
      });
    }

    function getProjectRoleIds() {
      return sortRoleIds(Array.from(new Set([
        ...(DATA.project.enabled_roles || []),
        ...(DATA.project.disabled_roles || []),
        ...((DATA.agents || []).map(agent => String(agent.role_id || "").trim()).filter(Boolean))
      ])));
    }

    function buildRoleSelectionFromProject(project) {
      const enabledSet = new Set(project.enabled_roles || []);
      const disabledSet = new Set(project.disabled_roles || []);
      const roleIds = getProjectRoleIds();
      const selection = {};
      roleIds.forEach(roleId => {
        selection[roleId] = enabledSet.has(roleId) && !disabledSet.has(roleId);
      });
      return selection;
    }

    function roleSelectionSnapshot(selection) {
      const enabled = [];
      const disabled = [];
      const roleIds = getProjectRoleIds();
      roleIds.forEach(roleId => {
        if (selection[roleId]) {
          enabled.push(roleId);
        } else {
          disabled.push(roleId);
        }
      });
      return {
        enabled: sortRoleIds(enabled),
        disabled: sortRoleIds(disabled)
      };
    }

    function roleSelectionChanges(beforeSelection, afterSelection) {
      const roleIds = getProjectRoleIds();
      const changedRoles = roleIds
        .filter(roleId => Boolean(beforeSelection[roleId]) !== Boolean(afterSelection[roleId]))
        .map(roleId => ({
          role_id: roleId,
          display_name: roleDisplayName(DATA.project, roleId),
          from_enabled: Boolean(beforeSelection[roleId]),
          to_enabled: Boolean(afterSelection[roleId])
        }))
        .sort((left, right) => compareRoleEntries(
          { display_name: left.display_name, role_id: left.role_id },
          { display_name: right.display_name, role_id: right.role_id }
        ));

      const afterSnapshot = roleSelectionSnapshot(afterSelection);
      return {
        hasChanges: changedRoles.length > 0,
        changedRoles: changedRoles,
        enabledRoles: afterSnapshot.enabled,
        disabledRoles: afterSnapshot.disabled
      };
    }

    let INITIAL_SETTINGS_SNAPSHOT = buildSettingsSnapshotFromData(DATA.settings || {});
    let INITIAL_ROLE_SELECTION = buildRoleSelectionFromProject(DATA.project);
    let CURRENT_ROLE_SELECTION = Object.assign({}, INITIAL_ROLE_SELECTION);
    let settingsApplyInFlight = false;
    let settingsApplyStatus = "";

    function settingsChangesFromSnapshots(before, after) {
      const specsByKey = {};
      SETTINGS_FIELD_SPECS.forEach(spec => {
        specsByKey[spec.key] = spec;
      });
      const keys = Object.keys(before);
      const changes = [];
      keys.forEach(key => {
        const oldValue = before[key];
        const newValue = after[key];
        const changed = (
          typeof oldValue === "number" || typeof newValue === "number" ||
          typeof oldValue === "boolean" || typeof newValue === "boolean"
        )
          ? oldValue !== newValue
          : String(oldValue ?? "") !== String(newValue ?? "");
        if (!changed) {
          return;
        }
        const spec = specsByKey[key];
        changes.push({
          key: key,
          label: spec ? spec.label : key,
          from: oldValue,
          to: newValue
        });
      });
      return changes;
    }

    function buildSettingsPatchPayload(currentSnapshot, roleChanges) {
      return {
        settings: {
          host: {
            primary_adapter: currentSnapshot["host.primary_adapter"],
            adapter_command: currentSnapshot["host.adapter_command"],
            session_mode: currentSnapshot["host.session_mode"],
            context_rot_guardrails: {
              max_turns_per_role_session:
                currentSnapshot["host.context_rot_guardrails.max_turns_per_role_session"],
              max_session_age_minutes:
                currentSnapshot["host.context_rot_guardrails.max_session_age_minutes"],
              force_reload_on_context_change:
                currentSnapshot["host.context_rot_guardrails.force_reload_on_context_change"]
            }
          },
          execution: {
            mode: currentSnapshot["execution.mode"],
            handoff_authority: currentSnapshot["execution.handoff_authority"],
            selection_policy: currentSnapshot["execution.selection_policy"],
            unexpected_event_policy: currentSnapshot["execution.unexpected_event_policy"]
          },
          dashboard: {
            output_file: currentSnapshot["dashboard.output_file"],
            refresh_policy: currentSnapshot["dashboard.refresh_policy"],
            failure_mode: currentSnapshot["dashboard.failure_mode"]
          }
        },
        roles: {
          enabled: roleChanges.enabledRoles,
          disabled: roleChanges.disabledRoles
        }
      };
    }

    function renderSettingsApplyActions(changes, roleChanges, errors) {
      const root = document.getElementById("project-settings-actions");
      if (!root) {
        return;
      }
      const editingLocked = settingsEditingLocked();
      const hasRoleChanges = Boolean(roleChanges && roleChanges.hasChanges);
      const hasChanges = changes.length > 0 || hasRoleChanges;
      const hasValidationErrors = Array.isArray(errors) && errors.length > 0;
      const serverHint = HAS_API
        ? ""
        : "Direct apply is only available when running the local server (http://...).";

      if (!hasChanges) {
        root.innerHTML = [
          "<h4>Apply Settings</h4>",
          '<p class="settings-hint">No settings or role-state changes detected.</p>',
          settingsApplyStatus
            ? '<div class="settings-copy-status">' + esc(settingsApplyStatus) + "</div>"
            : ""
        ].join("");
        return;
      }

      const changedSettings = changes.map(change => (
        "<li><code>" + esc(change.key) + "</code>: <strong>" +
        esc(String(change.to)) + "</strong></li>"
      ));
      const changedRoles = (roleChanges && roleChanges.hasChanges)
        ? roleChanges.changedRoles.map(change => (
          "<li><code>" + esc(change.role_id) + "</code>: <strong>" +
          esc(change.to_enabled ? "Enabled" : "Disabled") + "</strong></li>"
        ))
        : [];

      root.innerHTML = [
        "<h4>Apply Settings</h4>",
        '<p class="settings-hint">Apply validated changes directly to <code>project/config/project.yaml</code>.</p>',
        serverHint ? '<p class="settings-hint">' + esc(serverHint) + "</p>" : "",
        changedSettings.length
          ? "<strong>Setting changes</strong><ul class=\"settings-errors\">" + changedSettings.join("") + "</ul>"
          : "",
        changedRoles.length
          ? "<strong>Role changes</strong><ul class=\"settings-errors\">" + changedRoles.join("") + "</ul>"
          : "",
        '<div class="settings-prompt-actions">',
        '<button type="button" class="settings-copy-btn" id="project-settings-apply-btn">Apply Settings</button>',
        '<span class="settings-copy-status" id="project-settings-apply-status"></span>',
        "</div>"
      ].join("");

      const applyButton = document.getElementById("project-settings-apply-btn");
      const status = document.getElementById("project-settings-apply-status");
      const buttonDisabled = settingsApplyInFlight || hasValidationErrors || !HAS_API || editingLocked;
      if (applyButton) {
        applyButton.disabled = buttonDisabled;
        applyButton.textContent = settingsApplyInFlight ? "Applying..." : "Apply Settings";
        applyButton.addEventListener("click", () => {
          void applyProjectSettings();
        });
      }
      if (status) {
        if (settingsApplyInFlight) {
          status.textContent = "Applying settings...";
        } else if (editingLocked) {
          status.textContent = "Settings are locked while orchestration is running. Check IDE Operator thread.";
        } else if (settingsApplyStatus) {
          status.textContent = settingsApplyStatus;
        } else if (!HAS_API) {
          status.textContent = "Start the local server to apply settings.";
        } else if (hasValidationErrors) {
          status.textContent = "Resolve validation issues before applying.";
        } else {
          status.textContent = "Ready to apply.";
        }
      }
    }

    async function applyProjectSettings() {
      if (settingsApplyInFlight) {
        return;
      }
      if (settingsEditingLocked()) {
        settingsApplyStatus = "Settings are locked while orchestration is running. Check IDE Operator thread.";
        validateProjectSettingsUI();
        return;
      }
      if (!HAS_API) {
        settingsApplyStatus = "Direct apply requires the local Python server.";
        validateProjectSettingsUI();
        return;
      }

      const errors = validateProjectSettingsValues();
      const currentSnapshot = buildSettingsSnapshotFromUI();
      const changes = settingsChangesFromSnapshots(INITIAL_SETTINGS_SNAPSHOT, currentSnapshot);
      const roleChanges = roleSelectionChanges(INITIAL_ROLE_SELECTION, CURRENT_ROLE_SELECTION);
      if (errors.length) {
        settingsApplyStatus = "Fix validation issues before applying settings.";
        validateProjectSettingsUI();
        return;
      }
      if (!changes.length && !roleChanges.hasChanges) {
        settingsApplyStatus = "No changes detected.";
        validateProjectSettingsUI();
        return;
      }

      settingsApplyInFlight = true;
      settingsApplyStatus = "Applying settings...";
      validateProjectSettingsUI();

      try {
        await fetchJson("/api/settings", {
          method: "PATCH",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(buildSettingsPatchPayload(currentSnapshot, roleChanges))
        });
        settingsApplyStatus = "Settings applied successfully.";
        await refreshDashboardData();
      } catch (error) {
        settingsApplyStatus = "Apply failed: " + String(error.message || error);
      } finally {
        settingsApplyInFlight = false;
        validateProjectSettingsUI();
      }
    }

    function parseRoleIdList(value) {
      const roleIds = getProjectRoleIds();
      return String(value || "")
        .split(",")
        .map(roleId => roleId.trim())
        .filter(roleId => roleId.length > 0 && roleIds.includes(roleId));
    }

    function applyRoleToggleButtonState(button, enabled) {
      button.classList.remove("enabled", "disabled");
      button.classList.add(enabled ? "enabled" : "disabled");
      button.textContent = enabled ? "Enabled" : "Disabled";
      button.setAttribute("aria-pressed", enabled ? "true" : "false");
    }

    function refreshProjectRoleToggleStates() {
      const root = document.getElementById("project-content");
      if (!root) {
        return;
      }
      root.querySelectorAll("[data-role-toggle][data-role-id]").forEach(button => {
        const roleId = String(button.getAttribute("data-role-id") || "").trim();
        if (!roleId) {
          return;
        }
        applyRoleToggleButtonState(button, Boolean(CURRENT_ROLE_SELECTION[roleId]));
      });
    }

    function wireProjectRoleControls() {
      const root = document.getElementById("project-content");
      if (!root) {
        return;
      }
      root.querySelectorAll("[data-role-toggle][data-role-id]").forEach(button => {
        button.addEventListener("click", () => {
          if (settingsEditingLocked()) {
            return;
          }
          const roleId = String(button.getAttribute("data-role-id") || "").trim();
          if (!roleId || !getProjectRoleIds().includes(roleId)) {
            return;
          }
          if (roleId === "operator") {
            CURRENT_ROLE_SELECTION[roleId] = true;
            refreshProjectRoleToggleStates();
            setTopWarning("Operator cannot be disabled. AgentSquad requires Operator to coordinate orchestration.");
            validateProjectSettingsUI();
            return;
          }
          CURRENT_ROLE_SELECTION[roleId] = !Boolean(CURRENT_ROLE_SELECTION[roleId]);
          refreshProjectRoleToggleStates();
          validateProjectSettingsUI();
        });
      });
      root.querySelectorAll("[data-group-action][data-role-ids]").forEach(button => {
        button.addEventListener("click", () => {
          if (settingsEditingLocked()) {
            return;
          }
          const action = String(button.getAttribute("data-group-action") || "").trim().toLowerCase();
          const nextEnabled = action === "enable";
          const roleIds = parseRoleIdList(button.getAttribute("data-role-ids"));
          if (!roleIds.length) {
            return;
          }
          if (!nextEnabled && roleIds.includes("operator")) {
            setTopWarning("Operator cannot be disabled. AgentSquad requires Operator to coordinate orchestration.");
          }
          roleIds.forEach(roleId => {
            if (roleId === "operator") {
              CURRENT_ROLE_SELECTION[roleId] = true;
              return;
            }
            CURRENT_ROLE_SELECTION[roleId] = nextEnabled;
          });
          refreshProjectRoleToggleStates();
          validateProjectSettingsUI();
        });
      });
      refreshProjectRoleToggleStates();
      syncProjectEditingState();
    }

    function syncProjectEditingState() {
      const root = document.getElementById("project-content");
      if (!root) {
        return;
      }
      const locked = settingsEditingLocked();
      root.querySelectorAll(".project-settings input, .project-settings select, .project-settings textarea").forEach(element => {
        element.disabled = locked;
      });
      root.querySelectorAll("[data-role-toggle], [data-group-action]").forEach(element => {
        element.disabled = locked;
      });
    }

    function validateProjectSettingsValues() {
      const errors = [];
      const primaryAdapter = settingValue("setting-host-primary-adapter");
      if (!SETTINGS_OPTIONS.hostPrimaryAdapter.includes(primaryAdapter)) {
        errors.push("Primary Adapter must be one of the supported adapter IDs.");
      }

      const adapterCommand = settingValue("setting-host-adapter-command");
      if (!adapterCommand) {
        errors.push("Adapter Command must be a non-empty string.");
      }

      const sessionMode = settingValue("setting-host-session-mode");
      if (!SETTINGS_OPTIONS.hostSessionMode.includes(sessionMode)) {
        errors.push("Session Mode must be per-role-threads or stateless.");
      }

      const turnsRaw = settingValue("setting-guard-max-turns");
      const turns = Number(turnsRaw);
      if (!Number.isInteger(turns) || turns <= 0) {
        errors.push("Max Turns Per Role Session must be an integer greater than 0.");
      }

      const ageRaw = settingValue("setting-guard-max-age");
      const age = Number(ageRaw);
      if (!Number.isInteger(age) || age <= 0) {
        errors.push("Max Session Age must be an integer greater than 0.");
      }

      const forceReload = settingValue("setting-guard-force-reload");
      if (!SETTINGS_OPTIONS.boolValues.includes(forceReload)) {
        errors.push("Force Reload On Context Change must be true or false.");
      }

      const executionMode = settingValue("setting-execution-mode");
      if (!SETTINGS_OPTIONS.executionMode.includes(executionMode)) {
        errors.push("Execution Mode must be sequential.");
      }

      const handoffAuthority = settingValue("setting-execution-handoff-authority");
      if (!SETTINGS_OPTIONS.executionHandoffAuthority.includes(handoffAuthority)) {
        errors.push("Handoff Authority must be operator-mediated.");
      }

      const selectionPolicy = settingValue("setting-execution-selection-policy");
      if (!SETTINGS_OPTIONS.executionSelectionPolicy.includes(selectionPolicy)) {
        errors.push("Selection Policy must be dependency-fifo.");
      }

      const unexpectedPolicy = settingValue("setting-execution-unexpected-event-policy");
      if (!SETTINGS_OPTIONS.executionUnexpectedEventPolicy.includes(unexpectedPolicy)) {
        errors.push("Unexpected Event Policy must be errors-only, errors-or-warnings, or proceed.");
      }

      const dashboardOutput = settingValue("setting-dashboard-output-file");
      if (!dashboardOutput) {
        errors.push("Dashboard Output File must be a non-empty path.");
      }

      const refreshPolicy = settingValue("setting-dashboard-refresh-policy");
      if (!SETTINGS_OPTIONS.dashboardRefreshPolicy.includes(refreshPolicy)) {
        errors.push("Dashboard Refresh Policy must be after-every-step.");
      }

      const failureMode = settingValue("setting-dashboard-failure-mode");
      if (!SETTINGS_OPTIONS.dashboardFailureMode.includes(failureMode)) {
        errors.push("Dashboard Failure Mode must be non-blocking-log.");
      }
      return errors;
    }

    function validateProjectSettingsUI() {
      const errors = validateProjectSettingsValues();
      const validation = document.getElementById("project-settings-validation");
      if (validation) {
        if (!errors.length) {
          validation.className = "settings-validation ok";
          validation.innerHTML = "Settings values satisfy current dashboard constraints.";
        } else {
          validation.className = "settings-validation error";
          validation.innerHTML = "<strong>Validation issues:</strong><ul class=\"settings-errors\">" +
            errors.map(error => "<li>" + esc(error) + "</li>").join("") +
            "</ul>";
        }
      }

      const currentSnapshot = buildSettingsSnapshotFromUI();
      const changes = settingsChangesFromSnapshots(INITIAL_SETTINGS_SNAPSHOT, currentSnapshot);
      const roleChanges = roleSelectionChanges(INITIAL_ROLE_SELECTION, CURRENT_ROLE_SELECTION);
      renderSettingsApplyActions(changes, roleChanges, errors);
      syncProjectEditingState();
    }

    function wireProjectSettingsValidation() {
      SETTINGS_FIELD_SPECS.forEach(spec => {
        const element = document.getElementById(spec.id);
        if (!element) {
          return;
        }
        const eventName = element.tagName === "SELECT" ? "change" : "input";
        element.addEventListener(eventName, validateProjectSettingsUI);
      });
      validateProjectSettingsUI();
    }

    function renderProject() {
      const project = DATA.project;
      const html = [
        editLockBannerHtml(),
        '<div class="cards">',
        '<section class="card"><h3>Project</h3><dl class="kv">',
        kvRow("Project ID", project.id),
        kvRow("Project Name", project.name),
        kvRow("Primary Adapter", project.primary_adapter),
        kvRow("Adapter Command", project.adapter_command),
        kvRow("Session Mode", project.session_mode),
        "</dl></section>",
        '<section class="card"><h3>Execution</h3><dl class="kv">',
        kvRow("Execution Mode", project.execution_mode),
        kvRow("Handoff Authority", project.handoff_authority),
        kvRow("Selection Policy", project.selection_policy),
        kvRow("Enabled Roles", project.enabled_roles.length),
        kvRow("Disabled Roles", project.disabled_roles.length),
        "</dl></section>",
        "</div>",
        '<section class="project-agents">',
        "<h3>Agents By Discipline</h3>",
        '<p class="settings-hint">Use this menu to Enable/Disable A.I. agents.</p>',
        renderProjectAgentDirectory(project),
        "</section>",
        renderProjectSettings(DATA.settings || {})
      ].join("");
      document.getElementById("project-content").innerHTML = html;
      const settingsReadmeLink = document.getElementById("project-settings-readme-link");
      if (settingsReadmeLink) {
        settingsReadmeLink.addEventListener("click", event => {
          event.preventDefault();
          openDocumentsTabForPath("README.md");
        });
      }
      wireProjectRoleControls();
      wireProjectSettingsValidation();
    }

    function docTimestampText(value) {
      const raw = String(value || "").trim();
      if (!raw) {
        return "n/a";
      }
      return formatLocalTimestamp(raw);
    }

    function compareDocuments(left, right) {
      const leftTitle = String(left.title || left.path || "");
      const rightTitle = String(right.title || right.path || "");
      let cmp = 0;

      if (docSortKey === "created" || docSortKey === "modified") {
        const field = docSortKey === "created" ? "created_at_utc" : "modified_at_utc";
        const leftRaw = String(left[field] || "").trim();
        const rightRaw = String(right[field] || "").trim();
        if (!leftRaw && rightRaw) {
          cmp = 1;
        } else if (leftRaw && !rightRaw) {
          cmp = -1;
        } else {
          cmp = leftRaw.localeCompare(rightRaw, undefined, { sensitivity: "base", numeric: true });
        }
      } else {
        cmp = leftTitle.localeCompare(rightTitle, undefined, { sensitivity: "base", numeric: true });
      }

      if (cmp === 0) {
        cmp = String(left.path || "").localeCompare(String(right.path || ""), undefined, {
          sensitivity: "base",
          numeric: true
        });
      }
      return docSortDir === "desc" ? -cmp : cmp;
    }

    function renderDocuments() {
      const docs = DATA.documents || [];
      const list = document.getElementById("documents-list");
      const view = document.getElementById("documents-view");
      list.innerHTML = "";
      if (!docs.length) {
        list.innerHTML = '<div class="panel-pad empty">No documents found.</div>';
        view.innerHTML = '<p class="empty">No included markdown documents matched dashboard filters.</p>';
        return;
      }

      const sortedDocs = docs.slice().sort(compareDocuments);
      if (!activeDocId || !sortedDocs.some(doc => doc.id === activeDocId)) {
        activeDocId = sortedDocs[0].id;
      }

      const controls = document.createElement("div");
      controls.className = "doc-list-controls";
      controls.innerHTML = [
        '<label for="doc-sort-key">Sort By</label>',
        '<select id="doc-sort-key">',
        '<option value="name"' + (docSortKey === "name" ? " selected" : "") + ">Document Name</option>",
        '<option value="created"' + (docSortKey === "created" ? " selected" : "") + ">Creation Date</option>",
        '<option value="modified"' + (docSortKey === "modified" ? " selected" : "") + ">Last Modified Date</option>",
        "</select>",
        '<select id="doc-sort-dir">',
        '<option value="asc"' + (docSortDir === "asc" ? " selected" : "") + ">Ascending</option>",
        '<option value="desc"' + (docSortDir === "desc" ? " selected" : "") + ">Descending</option>",
        "</select>"
      ].join("");
      list.appendChild(controls);
      const keySelect = controls.querySelector("#doc-sort-key");
      const dirSelect = controls.querySelector("#doc-sort-dir");
      if (keySelect) {
        keySelect.addEventListener("change", () => {
          docSortKey = keySelect.value;
          renderDocuments();
        });
      }
      if (dirSelect) {
        dirSelect.addEventListener("change", () => {
          docSortDir = dirSelect.value;
          renderDocuments();
        });
      }

      sortedDocs.forEach(doc => {
        const button = document.createElement("button");
        button.className = "left-item" + (doc.id === activeDocId ? " active" : "");
        button.innerHTML = [
          '<span class="doc-item-title">' + esc(doc.title) + "</span>",
          '<span class="doc-item-meta">Created: ' + esc(docTimestampText(doc.created_at_utc)) + "</span>",
          '<span class="doc-item-meta">Last Modified: ' + esc(docTimestampText(doc.modified_at_utc)) + "</span>"
        ].join("");
        button.onclick = () => {
          activeDocId = doc.id;
          renderDocuments();
        };
        list.appendChild(button);
      });

      const active = sortedDocs.find(doc => doc.id === activeDocId) || sortedDocs[0];
      const createdText = docTimestampText(active.created_at_utc);
      const modifiedText = docTimestampText(active.modified_at_utc);
      view.innerHTML =
        "<h2>" + esc(active.title) + "</h2>" +
        '<p class="doc-path">' +
          fileLinkHtml(active.path, active.path) +
          "<br>Created: <strong>" + esc(createdText) + "</strong> | Last Modified: <strong>" + esc(modifiedText) + "</strong>" +
        "</p>" +
        active.html;
    }

    function renderTasks() {
      const search = document.getElementById("task-search").value.toLowerCase();
      const filter = document.getElementById("task-status-filter").value;
      const allTasks = DATA.tasks || [];
      const filtered = allTasks.filter(task => {
        const hay = TASK_COLUMNS.map(column => taskColumnText(task, column)).join(" ").toLowerCase();
        const matchesSearch = !search || hay.includes(search);
        const matchesStatus = !filter || filter === "ALL" || task.status === filter;
        return matchesSearch && matchesStatus;
      });

      filtered.sort((left, right) => {
        const leftRaw = taskColumnText(left, sortKey);
        const rightRaw = taskColumnText(right, sortKey);
        const cmp = leftRaw.localeCompare(rightRaw, undefined, { sensitivity: "base", numeric: true });
        return sortDir === "asc" ? cmp : -cmp;
      });

      const head = document.getElementById("tasks-head");
      head.innerHTML = "<tr>" + TASK_COLUMNS.map(column => {
        const marker = sortKey === column ? (sortDir === "asc" ? " ▲" : " ▼") : "";
        return '<th data-col="' + column + '">' + esc(TASK_LABELS[column]) + marker + "</th>";
      }).join("") + "</tr>";
      head.querySelectorAll("th").forEach(th => {
        th.onclick = () => {
          const nextKey = th.dataset.col;
          if (sortKey === nextKey) {
            sortDir = sortDir === "asc" ? "desc" : "asc";
          } else {
            sortKey = nextKey;
            sortDir = "asc";
          }
          renderTasks();
        };
      });

      const body = document.getElementById("tasks-body");
      if (!filtered.length) {
        body.innerHTML = '<tr><td colspan="' + TASK_COLUMNS.length + '" class="empty">No tasks match current filters.</td></tr>';
        return;
      }
      body.innerHTML = filtered.map(task => {
        return "<tr>" + TASK_COLUMNS.map(column => {
          if (column === "deliverables") {
            return "<td>" + renderDeliverablesCell(task) + "</td>";
          }
          const rendered = taskColumnText(task, column);
          return "<td>" + esc(rendered) + "</td>";
        }).join("") + "</tr>";
      }).join("");
    }

    function eventHtml(entry) {
      const role = entry.role_id || "unknown";
      const roleAccent = roleColor(role);
      const severity = eventSeverity(entry);
      const accent = severity === "error" ? "#ef4444" : (severity === "warning" ? "#f59e0b" : roleAccent);
      const status = entry.status ? " | " + entry.status : "";
      const task = entry.task_id ? " | Task " + entry.task_id : "";
      const summary = entry.summary || entry.event_type || "Activity event";
      const metaText = (entry.event_type || "event") + task + status;
      const runJournal = resolveKnownPath(entry.run_journal_path || "");
      const runJournalHtml = runJournal
        ? ' | Journal ' + fileLinkHtml(runJournal, runJournal)
        : "";
      const badge = severity === "error"
        ? '<span class="event-badge error">Error</span>'
        : (severity === "warning" ? '<span class="event-badge warning">Warning</span>' : "");
      return [
        '<article class="event ' + severity + '" style="border-left-color:' + accent + '">',
        '<div class="event-head">',
        '<span class="event-role" style="background:' + roleAccent + '">' + esc(role) + "</span>",
        '<span class="event-time">' + esc(formatLocalTimestamp(entry.ts_utc || "")) + "</span>",
        "</div>",
        badge,
        '<p class="event-summary">' + linkifyProjectFiles(summary) + "</p>",
        '<div class="event-meta">' + linkifyProjectFiles(metaText) + runJournalHtml + "</div>",
        "</article>"
      ].join("");
    }

    function renderActivity() {
      const root = document.getElementById("activity-log");
      const events = DATA.activity_log || [];
      if (!events.length) {
        root.innerHTML = '<p class="empty">No activity yet. Events appear here after orchestrator runs.</p>';
        return;
      }
      root.innerHTML = events.map(eventHtml).join("");
    }

    function renderAgentPanel(agent) {
      const panel = document.getElementById("agent-panel");
      const events = agent.activity || [];
      const roleContextHtml = agent.role_context_html || '<p class="empty">No role context file found.</p>';
      panel.innerHTML = [
        '<header class="agent-header" style="border-left-color:' + agent.color + '">',
        "<h3>" + esc(agent.display_name) + " (" + esc(agent.role_id) + ")</h3>",
        "</header>",
        '<section class="agent-section"><h4>Role Context</h4>' + roleContextHtml + "</section>",
        '<section class="agent-section"><h4>Activity</h4>',
        events.length ? '<div class="timeline">' + events.map(eventHtml).join("") + "</div>" :
          '<p class="empty">No activity for this agent yet.</p>',
        "</section>"
      ].join("");
    }

    function buildAgentTabButton(entry) {
      const button = document.createElement("button");
      button.className = "agent-tab" + (entry.role_id === activeAgentId ? " active" : "");
      button.style.borderLeft = "6px solid " + entry.color;
      const label = document.createElement("span");
      label.className = "agent-tab-label";
      label.textContent = entry.display_name;
      const statusDot = document.createElement("span");
      statusDot.className = "agent-status-dot " + (entry.enabled ? "enabled" : "disabled");
      statusDot.setAttribute("aria-label", entry.enabled ? "Enabled" : "Disabled");
      statusDot.title = entry.enabled ? "Enabled" : "Disabled";
      button.appendChild(label);
      button.appendChild(statusDot);
      button.onclick = () => {
        activeAgentId = entry.role_id;
        renderAgents();
      };
      return button;
    }

    function renderAgents() {
      const tabs = document.getElementById("agent-tabs");
      const enabledSet = new Set(DATA.project.enabled_roles || []);
      const disabledSet = new Set(DATA.project.disabled_roles || []);
      const agents = (DATA.agents || []).slice();
      const roleEntries = agents.map(agent => {
        const roleId = String(agent.role_id || "");
        const isEnabled = typeof agent.enabled === "boolean"
          ? agent.enabled
          : (enabledSet.has(roleId) && !disabledSet.has(roleId));
        return {
          role_id: roleId,
          display_name: String(agent.display_name || roleDisplayName(DATA.project, roleId)),
          color: String(agent.color || roleColor(roleId)),
          enabled: isEnabled,
          discipline: roleDiscipline(roleId)
        };
      });
      roleEntries.sort(compareRoleEntries);
      const { operatorEntry, grouped, categories } = groupedRoleEntries(roleEntries);
      const openGroups = readOpenAgentGroups();
      tabs.innerHTML = "";
      if (!roleEntries.length) {
        document.getElementById("agent-panel").innerHTML = '<p class="empty">No agents found.</p>';
        return;
      }
      const orderedRoleIds = [];
      if (operatorEntry) {
        orderedRoleIds.push(operatorEntry.role_id);
      }
      categories.forEach(category => {
        (grouped[category] || []).forEach(entry => orderedRoleIds.push(entry.role_id));
      });
      if (!activeAgentId || !orderedRoleIds.includes(activeAgentId)) {
        activeAgentId = orderedRoleIds[0];
      }

      if (operatorEntry) {
        tabs.appendChild(buildAgentTabButton(operatorEntry));
      }
      categories.forEach(category => {
        const entries = grouped[category] || [];
        if (!entries.length) {
          return;
        }
        const section = document.createElement("details");
        section.className = "agent-tab-group";
        section.open = openGroups.has(category);
        const heading = document.createElement("summary");
        heading.className = "agent-tab-group-title";
        heading.textContent = category + " (" + entries.length + ")";
        section.appendChild(heading);
        const body = document.createElement("div");
        body.className = "agent-tab-group-body";
        entries.forEach(entry => {
          body.appendChild(buildAgentTabButton(entry));
        });
        section.appendChild(body);
        section.addEventListener("toggle", () => {
          if (section.open) {
            openGroups.add(category);
          } else {
            openGroups.delete(category);
          }
          writeOpenAgentGroups(openGroups);
        });
        tabs.appendChild(section);
      });
      const active = agents.find(agent => agent.role_id === activeAgentId) || agents[0];
      renderAgentPanel(active);
    }

    let taskControlsWired = false;
    let liveEventSource = null;
    let liveReconnectTimer = null;
    let refreshQueued = false;

    async function fetchJson(path, options) {
      const response = await fetch(path, options || {});
      let payload = null;
      try {
        payload = await response.json();
      } catch (error) {
        payload = null;
      }
      if (!response.ok || !payload || payload.ok === false) {
        const message = payload && Array.isArray(payload.errors) && payload.errors.length
          ? payload.errors.join("; ")
          : ("Request failed: " + response.status + " " + response.statusText);
        throw new Error(message);
      }
      return payload;
    }

    function resetSettingsBaselines() {
      INITIAL_SETTINGS_SNAPSHOT = buildSettingsSnapshotFromData(DATA.settings || {});
      INITIAL_ROLE_SELECTION = buildRoleSelectionFromProject(DATA.project || {});
      CURRENT_ROLE_SELECTION = Object.assign({}, INITIAL_ROLE_SELECTION);
    }

    function applyDashboardPayload(nextPayload) {
      DATA = nextPayload || {};
      refreshKnownFileIndex();
      resetSettingsBaselines();
    }

    function updateTaskStatusFilterOptions() {
      const filter = document.getElementById("task-status-filter");
      if (!filter) {
        return;
      }
      const current = String(filter.value || "ALL");
      const statuses = ["ALL", ...Object.keys(DATA.project.status_counts || {})];
      filter.innerHTML = statuses.map(status => (
        '<option value="' + esc(status) + '">' + (status === "ALL" ? "All Statuses" : esc(status)) + "</option>"
      )).join("");
      if (statuses.includes(current)) {
        filter.value = current;
      } else {
        filter.value = "ALL";
      }
    }

    function initTaskControls() {
      updateTaskStatusFilterOptions();
      if (taskControlsWired) {
        return;
      }
      document.getElementById("task-search").addEventListener("input", renderTasks);
      document.getElementById("task-status-filter").addEventListener("change", renderTasks);
      taskControlsWired = true;
    }

    function renderAllPanels() {
      renderHeader();
      renderTopWarning();
      renderInitialization();
      renderProject();
      renderDocuments();
      initTaskControls();
      renderTasks();
      renderActivity();
      renderAgents();
    }

    async function refreshDashboardData() {
      if (!HAS_API) {
        return;
      }
      const response = await fetchJson("/api/dashboard");
      applyDashboardPayload(response.dashboard || {});
      renderAllPanels();
    }

    function queueDashboardRefresh() {
      if (refreshQueued) {
        return;
      }
      refreshQueued = true;
      window.setTimeout(() => {
        refreshQueued = false;
        void refreshDashboardData().catch(error => {
          console.error("Dashboard refresh failed:", error);
        });
      }, 120);
    }

    function scheduleLiveReconnect() {
      if (liveReconnectTimer) {
        return;
      }
      liveReconnectTimer = window.setTimeout(() => {
        liveReconnectTimer = null;
        connectLiveUpdates();
      }, 1000);
    }

    function connectLiveUpdates() {
      if (!HAS_API || typeof EventSource === "undefined") {
        return;
      }
      if (liveEventSource) {
        try {
          liveEventSource.close();
        } catch (error) {
          // Ignore close errors.
        }
      }
      const source = new EventSource("/api/events");
      liveEventSource = source;
      const handledEvents = [
        "connected",
        "tasks_changed",
        "activity_changed",
        "state_changed",
        "settings_changed",
        "message"
      ];
      handledEvents.forEach(eventName => {
        source.addEventListener(eventName, () => {
          if (eventName === "connected") {
            return;
          }
          queueDashboardRefresh();
        });
      });
      source.onerror = () => {
        try {
          source.close();
        } catch (error) {
          // Ignore close errors.
        }
        scheduleLiveReconnect();
      };
    }

    async function boot() {
      const persistedTab = safeStorageGet(STORAGE_KEYS.activeTab);
      if (persistedTab && TAB_DEFS.some(tab => tab.id === persistedTab)) {
        activeTab = persistedTab;
      }
      if (HAS_API) {
        try {
          await refreshDashboardData();
          if (!persistedTab && !initState().is_ready) {
            activeTab = "init";
          }
        } catch (error) {
          console.error("Initial dashboard load failed:", error);
          if (!persistedTab && !initState().is_ready) {
            activeTab = "init";
          }
          renderAllPanels();
        }
        renderTabs();
        connectLiveUpdates();
      } else {
        applyDashboardPayload(DATA);
        if (!persistedTab && !initState().is_ready) {
          activeTab = "init";
        }
        renderTabs();
        renderAllPanels();
      }
    }

    void boot();
  </script>
