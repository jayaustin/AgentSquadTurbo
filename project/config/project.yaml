  review_confirmed: false
execution:
  mode: sequential
  handoff_authority: operator-mediated
  selection_policy: dependency-fifo
  unexpected_event_policy: errors-only
backlog:
  statuses:
    - Todo
    - In Progress
    - Blocked
    - In Validation
    - Done
dashboard:
  enabled: true
  output_file: project/state/dashboard.html
  refresh_policy: after-every-step
  failure_mode: non-blocking-log
  docs:
    include_paths:
      - project/docs
      - docs
      - project/context
    exclude_globs:
      - superpowers/**
      - steering/**
      - runner/templates/**
      - project/workspaces/**/runs/**
      - project/workspaces/**/notes.md
    primary_name_keywords:
      - design
      - technical
      - architecture
      - spec
      - qa
      - localization
      - ux
      - audio
      - security
      - validation
  agent_colors:
    operator: "#3B82F6"
